<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="eigennode-aspect" content="1/1">
  <title>Rotating Ring</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      width: 100%; height: 100%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    html, body { background: #fff; }
    canvas { display: block; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const MAXW = 500;
// Square canvas — fit the smaller of the iframe's width/height (capped at MAXW).
let W = Math.min(window.innerWidth || MAXW, window.innerHeight || MAXW, MAXW);
let H = W; // square canvas, matching GlowScript's square window

// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

// ── Camera ─────────────────────────────────────────────────────────────────
// GlowScript default: camera on +z axis looking toward origin (ring in xy-plane
// appears as a circle). FOV 55° ≈ GlowScript's ~60° default, distance 3 fits
// the 3×3 plane with a small margin (same proportions as the original).
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
camera.position.set(0, 0, 3.0);
camera.lookAt(0, 0, 0);

// ── Renderer ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
document.body.appendChild(renderer.domElement);
document.body.style.width = W + 'px';

// ── Lighting ───────────────────────────────────────────────────────────────
// GlowScript: scene.lights = []; scene.ambient = color.white
// MeshBasicMaterial matches this exactly (no lighting computation at all).
scene.add(new THREE.AmbientLight(0xffffff, 1));

// ── Earth-textured ring ────────────────────────────────────────────────────
// GlowScript: ring(radius=1, thickness=0.08, axis=(0,0,1), texture=textures.earth)
// TorusGeometry(radius, tube, radialSegments, tubularSegments) lies in xy-plane.
const ringGeo = new THREE.TorusGeometry(1, 0.08, 32, 128);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x2255bb }); // placeholder until texture
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
scene.add(ringMesh);

// Load earth texture — same file GlowScript uses (earth_texture.jpg from S3),
// served same-origin to avoid CORS issues.
const loader = new THREE.TextureLoader();
loader.load('earth_texture.jpg', tex => {
  ringMat.map = tex;
  ringMat.color.set(0xffffff);
  ringMat.needsUpdate = true;
});

// ── Semi-transparent red plane ─────────────────────────────────────────────
// GlowScript: box(3×3×0.01, color=red, opacity=0.2) — visually a flat plane
const planeMat = new THREE.MeshBasicMaterial({
  color: 0xff0000, transparent: true, opacity: 0.2,
  side: THREE.DoubleSide, depthWrite: false,
});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(3, 3), planeMat));

// ── Z-axis cylinder ────────────────────────────────────────────────────────
// GlowScript: cylinder(pos=(0,0,-1), axis=(0,0,2), radius=0.02, color=black)
const axisMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const axisMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 2, 12), axisMat);
axisMesh.rotation.x = Math.PI / 2; // CylinderGeometry is along Y → rotate to Z
scene.add(axisMesh);

// ── Red dot ────────────────────────────────────────────────────────────────
// GlowScript: sphere(pos=(1,0,0), radius=0.1, color=red)
const dotMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
const dotMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), dotMat);
scene.add(dotMesh);

// ── Velocity arrow ─────────────────────────────────────────────────────────
// GlowScript: arrow(pos=(1,0,0.1), axis=(0,1,0), color=red, shaftwidth=0.03)
// Total length = |axis| = 1. Head ≈ 25% of length, width matches shaftwidth scale.
const arrowHelper = new THREE.ArrowHelper(
  new THREE.Vector3(0, 1, 0),    // initial direction (+y = tangential at phi=0)
  new THREE.Vector3(1, 0, 0.1),  // tail (slightly above the ring plane)
  1.0,                            // length
  0xff0000,                       // color
  0.25,                           // headLength
  0.08                            // headWidth
);
scene.add(arrowHelper);

// ── OrbitControls (= GlowScript userspin + zoom) ──────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 0, 0);

// ── Animation ──────────────────────────────────────────────────────────────
// GlowScript: while True: rate(100); r.rotate(angle=dt=0.03, axis=(0,0,1))
// → angular velocity ω = dt × rate = 0.03 × 100 = 3 rad/s
const OMEGA = 3.0;
let phi = 0;
let lastT = null;
const _dir = new THREE.Vector3();

function animate(t) {
  requestAnimationFrame(animate);
  if (lastT === null) lastT = t;
  const dt = Math.min((t - lastT) / 1000, 0.05); // cap at 50 ms for hidden-tab safety
  lastT = t;

  phi += OMEGA * dt;
  const cx = Math.cos(phi), cy = Math.sin(phi);

  ringMesh.rotation.z = phi;        // spin the earth texture with the ring

  dotMesh.position.set(cx, cy, 0);  // dot on ring circumference

  // Arrow tail at dot position (slightly above ring plane); direction tangential
  arrowHelper.position.set(cx, cy, 0.1);
  _dir.set(-cy, cx, 0);             // (-sin φ, cos φ, 0) is already unit length
  arrowHelper.setDirection(_dir);

  controls.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);

// ── Responsive resize ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = Math.min(window.innerWidth || MAXW, window.innerHeight || MAXW, MAXW);
  H = W;
  renderer.setSize(W, H);
  camera.aspect = 1;
  camera.updateProjectionMatrix();
  document.body.style.width = W + 'px';
});
</script>
</body>
</html>
